<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MSB Admin Dashboard</title>
  <link rel="stylesheet" href="../assets/home.css">
  <style>
    .admin-container { max-width: 1000px; margin: 100px auto; padding: 20px; }
    .controls { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; justify-content: space-between;}
    .filters { display: flex; gap: 12px; }
    .filter-btn { padding: 8px 16px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .card-grid { display: flex; flex-direction: column; gap: 16px; }
    .feedback-card { background: var(--bg-2); border: 1px solid var(--border); border-radius: 12px; padding: 24px; display: flex; justify-content: space-between; gap: 24px; }
    .user-info { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
    .idea-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .idea-details { font-size: 14px; line-height: 1.5; color: #E0E0E0; }
    .actions { display: flex; flex-direction: column; gap: 8px; min-width: 120px; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: 12px;}
    .badge-unreviewed { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
    .badge-approved { background: rgba(74, 222, 128, 0.2); color: #4ade80; }
    .badge-hidden { background: rgba(255, 122, 122, 0.2); color: #ff7a7a; }
    
    /* New Auth Styles */
    .auth-guard { max-width: 400px; margin: 150px auto; padding: 40px; background: var(--bg-2); border: 1px solid var(--border-strong); border-radius: 16px; text-align: center; }
  </style>
</head>
<body>

<nav>
  <div class="logo">ScribbleAI Admin</div>
  <div class="nav-cta" id="navCta"></div>
</nav>

<div id="authGuard" class="auth-guard">
  <h2>Admin Access</h2>
  <p id="authMsg" style="color: var(--muted); margin: 16px 0 24px; font-size: 14px;">Sign in to view the dashboard.</p>
  <button id="loginBtn" class="btn btn-primary" style="width: 100%;">Sign in with Google</button>
  <button id="logoutBtn" class="btn btn-outline" style="width: 100%; display: none;">Sign Out</button>
</div>

<div id="dashboard" class="admin-container" style="display: none;">
  <h2>Feedback <span class="serif">Dashboard</span></h2>
  
  <div class="controls">
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all')">All</button>
      <button class="filter-btn" onclick="setFilter('unreviewed')">Unreviewed</button>
      <button class="filter-btn" onclick="setFilter('approved')">Approved</button>
      <button class="filter-btn" onclick="setFilter('hidden')">Hidden</button>
    </div>
    <button class="btn btn-outline" style="border-color: #ff7a7a; color: #ff7a7a;" onclick="deleteAll()">Delete All Shown</button>
  </div>

  <div class="card-grid" id="feedbackList">
    <p style="color: var(--muted);">Loading submissions...</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD5xI8GOG1lEKXBCunwq6qekg3QQOSijZ8",
    authDomain: "sitedropio.firebaseapp.com",
    databaseURL: "https://sitedropio-default-rtdb.firebaseio.com",
    projectId: "sitedropio"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  // UI Elements
  const authGuard = document.getElementById('authGuard');
  const dashboard = document.getElementById('dashboard');
  const authMsg = document.getElementById('authMsg');
  const loginBtn = document.getElementById('loginBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const navCta = document.getElementById('navCta');

  // App State
  let allFeedback = [];
  let currentFilter = 'all';
  let isListeningToDB = false;

  // 1. Handle Authentication
  onAuthStateChanged(auth, (user) => {
    if (user) {
      // Check if it's the exact admin email
      if (user.email === 'imcrabfr@gmail.com') {
        // ALLOWED ACCESS
        authGuard.style.display = 'none';
        dashboard.style.display = 'block';
        navCta.innerHTML = `<button class="btn btn-outline" onclick="logout()">Sign Out</button>`;
        
        // Start fetching database info only if they are the admin
        if (!isListeningToDB) {
          startDatabaseListener();
          isListeningToDB = true;
        }
      } else {
        // DENIED ACCESS (Logged in, but wrong email)
        authGuard.style.display = 'block';
        dashboard.style.display = 'none';
        navCta.innerHTML = '';
        authMsg.textContent = `Access Denied: ${user.email} is not an admin.`;
        authMsg.style.color = '#ff7a7a'; // Red warning text
        loginBtn.style.display = 'none';
        logoutBtn.style.display = 'inline-block';
      }
    } else {
      // NOT LOGGED IN
      authGuard.style.display = 'block';
      dashboard.style.display = 'none';
      navCta.innerHTML = '';
      authMsg.textContent = 'Sign in to view the dashboard.';
      authMsg.style.color = 'var(--muted)';
      loginBtn.style.display = 'inline-block';
      logoutBtn.style.display = 'none';
    }
  });

  loginBtn.onclick = () => signInWithPopup(auth, new GoogleAuthProvider()).catch(err => console.error(err));
  logoutBtn.onclick = () => signOut(auth);
  window.logout = () => signOut(auth); // For the top nav button

  // 2. Handle Database Operations
  function startDatabaseListener() {
    onValue(ref(db, 'msb_feedback'), (snapshot) => {
      allFeedback = [];
      snapshot.forEach((child) => {
        allFeedback.push({ id: child.key, ...child.val() });
      });
      allFeedback.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
      renderList();
    });
  }

  window.setFilter = function(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    renderList();
  };

  function renderList() {
    const listEl = document.getElementById('feedbackList');
    listEl.innerHTML = '';
    
    const filtered = allFeedback.filter(item => currentFilter === 'all' || item.status === currentFilter);

    if (filtered.length === 0) {
      listEl.innerHTML = `<p style="color: var(--muted);">No submissions found.</p>`;
      return;
    }

    filtered.forEach(item => {
      const date = item.timestamp ? new Date(item.timestamp).toLocaleDateString() : 'Unknown date';
      const safeTitle = escapeHTML(item.title);
      const safeDetails = escapeHTML(item.details);
      
      listEl.innerHTML += `
        <div class="feedback-card">
          <div>
            <span class="badge badge-${item.status}">${item.status}</span>
            <div class="user-info">${escapeHTML(item.name)} (${escapeHTML(item.email)}) • ${date}</div>
            <div class="idea-title">${safeTitle}</div>
            <div class="idea-details">${safeDetails}</div>
          </div>
          <div class="actions">
            ${item.status !== 'approved' ? `<button class="btn btn-outline btn-sm" onclick="updateStatus('${item.id}', 'approved')">Approve</button>` : ''}
            ${item.status !== 'hidden' ? `<button class="btn btn-outline btn-sm" onclick="updateStatus('${item.id}', 'hidden')">Hide</button>` : ''}
            ${item.status !== 'unreviewed' ? `<button class="btn btn-outline btn-sm" onclick="updateStatus('${item.id}', 'unreviewed')">Mark Unreviewed</button>` : ''}
            <button class="btn btn-primary btn-sm" style="background:#ff4444;box-shadow:none;" onclick="deleteItem('${item.id}')">Delete</button>
          </div>
        </div>
      `;
    });
  }

  window.updateStatus = async function(id, newStatus) {
    await update(ref(db, `msb_feedback/${id}`), { status: newStatus });
  };

  window.deleteItem = async function(id) {
    if(confirm("Are you sure you want to delete this submission?")) {
      await remove(ref(db, `msb_feedback/${id}`));
    }
  };

  window.deleteAll = async function() {
    const filtered = allFeedback.filter(item => currentFilter === 'all' || item.status === currentFilter);
    if(filtered.length === 0) return;
    if(confirm(`Are you sure you want to delete ALL ${filtered.length} currently visible submissions? This cannot be undone.`)) {
      for (const item of filtered) {
        await remove(ref(db, `msb_feedback/${item.id}`));
      }
    }
  };

  function escapeHTML(str) {
    if (!str) return '';
    return str.replace(/[&<>'"]/g, 
      tag => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          "'": '&#39;',
          '"': '&quot;'
        }[tag]));
  }
</script>
</body>
</html>
