<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nexus | Complete Payment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Instrument+Serif&display=swap" rel="stylesheet">
<link rel="icon" href="../assets/logo.png" />
<style>
  :root {
    --bg: #0a0a0f;
    --bg-2: #0f0f17;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --text: #f5f5f7;
    --muted: #9a9aa8;
    --accent: #c8a96a;
    --grad: linear-gradient(135deg, #e9d8a6 0%, #c8a96a 40%, #8c6f3f 100%);
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    height: 100%;
  }
  a { color: inherit; text-decoration: none; }
  
  /* Ambient background */
  body::before {
    content: ""; position: fixed; inset: 0; z-index: -2;
    background:
      radial-gradient(800px 500px at 80% -10%, rgba(200,169,106,0.12), transparent 60%),
      radial-gradient(700px 500px at 10% 10%, rgba(120,90,200,0.10), transparent 60%),
      radial-gradient(900px 600px at 50% 110%, rgba(200,169,106,0.08), transparent 60%),
      var(--bg);
  }
  body::after {
    content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 40px;
    backdrop-filter: blur(20px) saturate(160%);
    background: rgba(10,10,15,0.6);
    border-bottom: 1px solid var(--border);
  }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 17px; letter-spacing: -0.01em; }
  .logo-mark {
    width: 48px; height: 31px; border-radius: 11px;
    display: grid; place-items: center; color: #0a0a0f; font-weight: 800; font-size: 14px;
    background: var(--surface); border: 1px solid var(--border);
  }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: 500;
    transition: all .2s ease; cursor: pointer; border: none; font-family: inherit;
  }
  .btn-ghost { color: var(--muted); background: none; }
  .btn-ghost:hover { color: var(--text); }
  .btn-primary {
    background: var(--grad); color: #0a0a0f; font-weight: 600; width: 100%;
    box-shadow: 0 8px 30px rgba(200,169,106,0.25), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 40px rgba(200,169,106,0.35), inset 0 1px 0 rgba(255,255,255,0.4);
  }
  .btn-lg { padding: 14px 24px; font-size: 15px; border-radius: 12px; }

  /* Payment Container */
  .hero {
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; padding: 100px 24px 40px;
  }
  
  .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px; border: 1px solid var(--border-strong); border-radius: 999px;
    font-size: 12.5px; color: var(--accent); margin-bottom: 24px; font-weight: 500;
    background: var(--surface); backdrop-filter: blur(10px); text-transform: uppercase; letter-spacing: 0.1em;
  }

  h1 {
    font-size: clamp(32px, 5vw, 56px); line-height: 1.05; letter-spacing: -0.03em;
    font-weight: 600; margin-bottom: 16px;
  }
  h1 .serif {
    font-family: 'Instrument Serif', serif; font-weight: 400; font-style: italic;
    background: var(--grad); -webkit-background-clip: text; background-clip: text;
    color: transparent; display: inline-block; padding: 0 0.08em 0.05em;
  }
  .sub { color: var(--muted); font-size: 17px; max-width: 500px; line-height: 1.55; margin-bottom: 40px; }

  /* Glassmorphic Pay Box */
  .pay-box {
    width: 100%; max-width: 440px;
    background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    border: 1px solid var(--border-strong); border-radius: 24px; padding: 40px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(200,169,106,0.08), 0 0 80px rgba(200,169,106,0.08);
    backdrop-filter: blur(20px);
    display: flex; flex-direction: column; align-items: center; gap: 24px;
  }

  /* Interactive QR Code Wrapper */
  .qr-wrapper {
    background: #000000; /* Changed to black */
    padding: 16px;
    border-radius: 16px;
    width: 220px;
    height: 220px;
    display: grid;
    place-items: center;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1); /* Adjusted shadow for dark bg */
    cursor: zoom-in;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .qr-wrapper:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: inset 0 0 0 1px rgba(200,169,106,0.3), 0 10px 30px rgba(0,0,0,0.5);
  }
  
  .qr-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 8px;
  }

  .divider {
    display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 13px; width: 100%;
  }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }

  /* Lightbox Overlay */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(5, 5, 10, 0.7);
    backdrop-filter: blur(16px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    padding: 20px;
  }
  .lightbox.active {
    opacity: 1;
    pointer-events: auto;
  }
  .lightbox img {
    max-width: 100%;
    max-height: 85vh;
    border-radius: 24px;
    background: #000000;
    padding: 24px;
    box-shadow: 0 40px 100px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.1);
    transform: scale(0.95);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    cursor: zoom-out;
  }
  .lightbox.active img {
    transform: scale(1);
  }
  .lightbox-close {
    position: absolute;
    top: 24px;
    right: 24px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border-strong);
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .lightbox-close:hover {
    background: rgba(255,255,255,0.1);
    color: var(--text);
    transform: scale(1.05);
  }

  @media (max-width: 600px) {
    nav { padding: 14px 20px; }
    .pay-box { padding: 32px 24px; }
    .lightbox-close { top: 16px; right: 16px; }
  }
</style>
</head>
<body>

<nav>
  <a href="../index.html" class="logo">
    <div class="logo-mark">
      <img src="../assets/logo.png" alt="Nexus logo" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;" onerror="this.style.display='none'; this.parentNode.innerText='N'" />
    </div>
  </a>
  <div>
    <a href="../index.html" class="btn btn-ghost">← Back to home</a>
  </div>
</nav>

<div class="hero">
  <div class="eyebrow">Donate</div>
  <h1>Complete your <span class="serif">Donation</span></h1>
  <p class="sub">Scan the QR code and then complete your donation. (Not required but appreciated!)</p>

  <div class="pay-box">
    
    <div class="qr-wrapper" onclick="openLightbox()">
      <img src="../assets/cashapp/qr.png" alt="Cash App QR Code for $whosowen101">
    </div>

    <div class="divider">or</div>

    <a href="https://cash.app/$whosowen101" target="_blank" rel="noopener noreferrer" class="btn btn-primary btn-lg">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;">
        <line x1="12" y1="1" x2="12" y2="23"></line>
        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
      </svg>
        Donate to me
    </a>
    
  </div>
</div>

<div class="lightbox" id="qrLightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" aria-label="Close">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </button>
  <img src="../assets/cashapp/qr.png" alt="Enlarged Cash App QR Code">
</div>

<script>
  const lightbox = document.getElementById('qrLightbox');
  
  function openLightbox() {
    lightbox.classList.add('active');
    document.body.style.overflow = 'hidden'; // Stop background scrolling
  }

  function closeLightbox(e) {
    // Close if they click the background overlay, the close button, or the big image itself
    if (e.target === lightbox || e.target.closest('.lightbox-close') || e.target.tagName === 'IMG') {
      lightbox.classList.remove('active');
      document.body.style.overflow = ''; // Restore scrolling
    }
  }

  // Close when pressing the Escape key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && lightbox.classList.contains('active')) {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
    }
  });
</script>

</body>
</html>
