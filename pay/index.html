<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#06060a" />
<title>ScribbleAI | Complete Payment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Instrument+Serif&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css" />
    <link rel="icon" href="/assets/logo.png" />

</head>
<body class="page-pay">

<nav>
  <a href="https://scribbleai.dev" class="logo">
    <div class="logo-mark">
      <img src="assets/logo.png" alt="ScribbleAI logo" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;" onerror="this.style.display='none'; this.parentNode.innerText='N'" />
    </div>
  </a>
  <div>
    <a href="https://scribbleai.dev" class="btn btn-ghost">← Back to home</a>
  </div>
</nav>

<div class="hero">
  <div class="eyebrow">Donate</div>
  <h1>Complete your <span class="serif">Donation</span></h1>
  <p class="sub">Help fund the new scribbleai.dev domain. Scan the QR code or click below to donate.</p>

  <div class="pay-box">
    
    <div class="goal-tracker">
      <div class="goal-header">
        <span class="goal-title">Domain Goal (scribbleai.dev)</span>
        <div class="goal-amounts">
          <span id="currentAmountDisplay">$0.00</span> <span>/ $10.81</span>
        </div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="goalProgressBar"></div>
      </div>
    </div>

    <div class="qr-wrapper" onclick="openLightbox('qr')">
      <img src="assets/cashapp/qr.png" alt="Cash App QR Code for $whosowen101">
    </div>

    <div class="divider">or</div>

    <a href="https://cash.app/$whosowen101" target="_blank" rel="noopener noreferrer" class="btn btn-primary btn-lg">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;">
        <line x1="12" y1="1" x2="12" y2="23"></line>
        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
      </svg>
        Donate to me
    </a>
  </div>

  <button class="view-donators-btn" onclick="openLightbox('donators')">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
      <circle cx="9" cy="7" r="4"></circle>
      <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
    </svg>
    View Donators
  </button>
</div>

<div class="lightbox" id="mainLightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" aria-label="Close">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </button>
  
  <img id="qrContent" src="assets/cashapp/qr.png" alt="Enlarged Cash App QR Code" style="display: none;">
  
  <div id="donatorsContent" class="donators-modal">
    <h3>Wall of Fame</h3>
    <p>A massive thank you to the people bringing the new ScribbleAI domain to life!</p>
    <ul class="donators-list" id="donatorsListContainer">
      </ul>
  </div>
</div>

<script>
  /* ========================================================
     1. CONFIGURATION (UPDATE THESE VALUES!)
     ======================================================== */
  
  // Update this number when you receive a donation
  const currentDonations = 0.00; 
  const goalAmount = 10.81;

  // Add names here! e.g. ['John Doe', 'Sarah', 'Anonymous']
const donatorsList = ['Be the first to donate and see your name here!']; 

  /* ========================================================
     2. LOGIC & INITIALIZATION
     ======================================================== */

  // Initialize Goal Bar
  window.addEventListener('DOMContentLoaded', () => {
    const progressFill = document.getElementById('goalProgressBar');
    const amountText = document.getElementById('currentAmountDisplay');
    
    // Calculate percentage (cap at 100%)
    let percentage = (currentDonations / goalAmount) * 100;
    if (percentage > 100) percentage = 100;
    
    // Set the display text and bar width
    amountText.innerText = `$${currentDonations.toFixed(2)}`;
    // Small delay so the bar animates in smoothly on page load
    setTimeout(() => {
      progressFill.style.width = `${percentage}%`;
    }, 100);

    // Initialize Donators List
    const listContainer = document.getElementById('donatorsListContainer');
    
    if (donatorsList.length === 0) {
      listContainer.innerHTML = '<div class="empty-state">No donations yet. Be the first to claim a spot!</div>';
    } else {
      listContainer.innerHTML = donatorsList.map(name => 
        `<li class="donator-item">${name}</li>`
      ).join('');
    }
  });

  /* ========================================================
     3. LIGHTBOX FUNCTIONALITY
     ======================================================== */

  const lightbox = document.getElementById('mainLightbox');
  const qrContent = document.getElementById('qrContent');
  const donatorsContent = document.getElementById('donatorsContent');

  function openLightbox(type) {
    // Hide both contents first
    qrContent.style.display = 'none';
    donatorsContent.classList.remove('show-spring');
    
    // Show the requested content
    if (type === 'qr') {
      qrContent.style.display = 'block';
    } else if (type === 'donators') {
      donatorsContent.classList.add('show-spring');
    }

    lightbox.classList.add('active');
    document.body.style.overflow = 'hidden'; // Stop background scrolling
  }

  function closeLightbox(e) {
    // Close if clicking the background, the close button, or the QR image
    if (e.target === lightbox || e.target.closest('.lightbox-close') || e.target.tagName === 'IMG') {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
      
      // Delay hiding the spring modal so the fade out completes first
      setTimeout(() => {
        donatorsContent.classList.remove('show-spring');
      }, 300);
    }
  }

  // Close when pressing the Escape key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && lightbox.classList.contains('active')) {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
      setTimeout(() => {
        donatorsContent.classList.remove('show-spring');
      }, 300);
    }
  });
</script>

</body>
</html>
