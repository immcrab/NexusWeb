<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Projects | Manage Saved AI Workspaces</title>
<link rel="icon" href="assets/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06060a;
    --sidebar: #0b0b14;
    --surface: rgba(255,255,255,0.03);
    --surface-hover: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.06);
    --border-strong: rgba(255,255,255,0.12);
    --text: #f5f5f7;
    --muted: #8e8e9f;
    --accent: #c8a96a;
    --grad: linear-gradient(135deg, #e9d8a6 0%, #c8a96a 40%, #8c6f3f 100%);
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
    min-height: 100vh; padding: 40px 24px; -webkit-font-smoothing: antialiased;
  }
  .dashboard-wrapper { max-width: 1100px; margin: 0 auto; }
  header {
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border-strong); padding-bottom: 20px; margin-bottom: 32px;
  }
  .title-section h1 { font-size: 24px; font-weight: 700; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .title-section p { color: var(--muted); font-size: 13px; margin-top: 4px; }
  
  .back-btn {
    display: inline-flex; align-items: center; gap: 8px; background: var(--surface);
    border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 6px;
    text-decoration: none; font-size: 13px; font-weight: 500; transition: all 0.2s ease;
  }
  .back-btn:hover { background: var(--surface-hover); border-color: var(--accent); }

  .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
  .project-card {
    background: var(--sidebar); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; display: flex; flex-direction: column; justify-content: space-between;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .project-card:hover { transform: translateY(-2px); border-color: var(--border-strong); box-shadow: 0 12px 24px rgba(0,0,0,0.4); }
  
  .project-details h3 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .project-details .meta-time { font-size: 11px; color: var(--muted); display: block; margin-bottom: 16px; }
  
  /* Inline Edit Input Field Style */
  .rename-input {
    width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--accent); border-radius: 6px;
    color: var(--text); font-family: inherit; font-size: 15px; padding: 4px 8px; margin-bottom: 6px; outline: none;
  }

  .card-actions { display: flex; gap: 8px; border-top: 1px solid var(--border); padding-top: 14px; margin-top: 12px; }
  .action-trigger {
    flex: 1; text-align: center; padding: 7px 0; font-size: 12px; font-weight: 500; border-radius: 6px;
    cursor: pointer; transition: all 0.2s ease; border: none; background: none; display: inline-flex; justify-content: center; align-items: center; gap: 4px;
  }
  .action-trigger.open-type { background: var(--grad); color: #06060a; font-weight: 600; }
  .action-trigger.open-type:hover { opacity: 0.9; }
  .action-trigger.edit-type { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
  .action-trigger.edit-type:hover { background: var(--surface-hover); }
  .action-trigger.delete-type { background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.2); color: #f87171; }
  .action-trigger.delete-type:hover { background: rgba(239, 68, 68, 0.18); border-color: #f87171; }

  .empty-state {
    grid-column: 1 / -1; text-align: center; padding: 60px 20px; background: var(--sidebar);
    border: 1px dashed var(--border-strong); border-radius: var(--radius); color: var(--muted);
  }
  .empty-state p { margin-bottom: 16px; font-size: 14px; }
</style>
</head>
<body>

<div class="dashboard-wrapper">
  <header>
    <div class="title-section">
      <h1>Nexus Project Manifest</h1>
      <p>Manage, rename, view, or reload local builds saved within your LocalStorage workspace engine sandbox</p>
    </div>
    <a href="builder.html" class="back-btn">
      &larr; Return to Live Studio
    </a>
  </header>

  <div class="projects-grid" id="manifestGridContainer">
  </div>
</div>

<script>
  function renderStoredProjectsManifest() {
    const container = document.getElementById('manifestGridContainer');
    const projectsList = JSON.parse(localStorage.getItem('nexus_projects_manifest') || '[]');

    if (projectsList.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <p>No compiled components found in active client cache storage.</p>
          <a href="builder.html" class="back-btn" style="display:inline-flex;">Create New Project Layout</a>
        </div>`;
      return;
    }

    container.innerHTML = '';
    projectsList.forEach((project) => {
      const cardElement = document.createElement('div');
      cardElement.className = 'project-card';
      cardElement.id = `card_${project.id}`;
      cardElement.innerHTML = `
        <div class="project-details" id="details_box_${project.id}">
          <h3 id="title_Display_${project.id}">${escapeHtmlSymbols(project.name)}</h3>
          <span class="meta-time">Compiled: ${project.timestamp}</span>
        </div>
        <div class="card-actions" id="actions_box_${project.id}">
          <button class="action-trigger open-type" onclick="loadProjectWorkspace('${project.id}')">Open</button>
          <button class="action-trigger edit-type" onclick="initiateInlineRename('${project.id}')">Rename</button>
          <button class="action-trigger delete-type" onclick="initiateInlineDelete('${project.id}')">Delete</button>
        </div>
      `;
      container.appendChild(cardElement);
    });
  }

  window.loadProjectWorkspace = (projectId) => {
    const list = JSON.parse(localStorage.getItem('nexus_projects_manifest') || '[]');
    const match = list.find(p => p.id === projectId);
    if (match) {
      localStorage.setItem('nexus_current_active_code', match.sourceCode);
      localStorage.setItem('nexus_current_active_title', match.name);
      window.location.href = 'builder.html';
    }
  };

  // Inline Replacement for Prompt popup
  window.initiateInlineRename = (projectId) => {
    const list = JSON.parse(localStorage.getItem('nexus_projects_manifest') || '[]');
    const project = list.find(p => p.id === projectId);
    if (!project) return;

    const detailsBox = document.getElementById(`details_box_${projectId}`);
    const actionsBox = document.getElementById(`actions_box_${projectId}`);

    // Replace text view with input element
    detailsBox.innerHTML = `
      <input type="text" class="rename-input" id="input_${projectId}" value="${escapeHtmlSymbols(project.name)}" />
      <span class="meta-time">Compiled: ${project.timestamp}</span>
    `;

    // Swap standard action triggers with inline confirm panel
    actionsBox.innerHTML = `
      <button class="action-trigger open-type" onclick="saveInlineRename('${projectId}')">Save</button>
      <button class="action-trigger edit-type" onclick="renderStoredProjectsManifest()">Cancel</button>
    `;

    const inputField = document.getElementById(`input_${projectId}`);
    inputField.focus();
    inputField.select();
    
    // Allow pressing Enter key to save change directly
    inputField.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') saveInlineRename(projectId);
      if (e.key === 'Escape') renderStoredProjectsManifest();
    });
  };

  window.saveInlineRename = (projectId) => {
    const inputField = document.getElementById(`input_${projectId}`);
    if (!inputField) return;
    
    const newTitleValue = inputField.value.trim();
    if (newTitleValue) {
      let list = JSON.parse(localStorage.getItem('nexus_projects_manifest') || '[]');
      const index = list.findIndex(p => p.id === projectId);
      if (index !== -1) {
        list[index].name = newTitleValue;
        localStorage.setItem('nexus_projects_manifest', JSON.stringify(list));
      }
    }
    renderStoredProjectsManifest();
  };

  // Inline Replacement for Confirm alert popup
  window.initiateInlineDelete = (projectId) => {
    const actionsBox = document.getElementById(`actions_box_${projectId}`);
    if (!actionsBox) return;

    // Changes the button row directly to a double-checking state
    actionsBox.innerHTML = `
      <span style="font-size:11px; color:#f87171; display:flex; align-items:center; font-weight:600;">Confirm Purge?</span>
      <button class="action-trigger delete-type" style="padding: 4px 8px; flex:none;" onclick="executeProjectPurge('${projectId}')">Yes, Delete</button>
      <button class="action-trigger edit-type" style="padding: 4px 8px; flex:none;" onclick="renderStoredProjectsManifest()">No</button>
    `;
  };

  window.executeProjectPurge = (projectId) => {
    let list = JSON.parse(localStorage.getItem('nexus_projects_manifest') || '[]');
    const filtered = list.filter(p => p.id !== projectId);
    localStorage.setItem('nexus_projects_manifest', JSON.stringify(filtered));
    
    localStorage.removeItem('nexus_current_active_code');
    localStorage.removeItem('nexus_current_active_title');
    
    renderStoredProjectsManifest();
  };

  function escapeHtmlSymbols(rawText) {
    return rawText
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  document.addEventListener('DOMContentLoaded', renderStoredProjectsManifest);
</script>
</body>
</html>
