<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub AI Models Dashboard</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --text-color: #c9d1d9;
            --accent-color: #2f81f7;
            --input-bg: #0d1117;
        }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 320px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-sizing: border-box;
        }
        .api-section {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        label {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
            display: block;
            color: #8b949e;
        }
        input, textarea {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            padding: 8px 12px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .model-list-container {
            flex-grow: 1;
            overflow-y: auto;
        }
        .model-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 4px;
        }
        .model-item:hover { background-color: #21262d; }
        .model-item.active { background-color: #1f6feb; color: #ffffff; }
        .model-icon {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 11px;
        }
        .icon-meta { background: #0064e0; color: white; }
        .icon-mistral { background: #ff4500; color: white; }
        .icon-cohere { background: #3c2475; color: #ccfbf1; }
        .icon-grok { background: #000000; color: white; border: 1px solid #30363d; }
        
        .main-content { flex-grow: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 15px 20px; border-bottom: 1px solid var(--border-color); font-weight: 600; }
        .chat-window { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 8px; line-height: 1.5; font-size: 15px; white-space: pre-wrap; }
        .message.user { background-color: #24292f; align-self: flex-end; border: 1px solid var(--border-color); }
        .message.assistant { background-color: var(--panel-bg); align-self: flex-start; border: 1px solid var(--border-color); }
        .chat-input-area { padding: 20px; border-top: 1px solid var(--border-color); display: flex; gap: 10px; }
        textarea { resize: none; height: 50px; }
        button { background-color: #238636; color: white; border: none; border-radius: 6px; padding: 0 20px; cursor: pointer; font-weight: 500; }
        button:hover { background-color: #2ea44f; }
        button:disabled { background-color: #21262d; color: #8b949e; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="api-section">
            <label for="tokenInput">GitHub Classic Token (ghp_...)</label>
            <input type="password" id="tokenInput" placeholder="Paste token here..." onchange="saveToken()">
        </div>

        <label>Available Models</label>
        <div class="model-list-container" id="modelList"></div>
    </div>

    <div class="main-content">
        <div class="chat-header" id="currentModelHeader">Select a model</div>
        <div class="chat-window" id="chatWindow">
            <div class="message assistant">Ready. Select a model on the left, paste your token, and send a message.</div>
        </div>
        <div class="chat-input-area">
            <textarea id="userInput" placeholder="Type a message... (Ctrl+Enter)"></textarea>
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const modelsCatalog = [
            { id: "meta-llama-3-8b-instruct", name: "Llama 3 8B (Universal Access)", brand: "meta", iconClass: "icon-meta", text: "3" },
            { id: "meta-llama-3.1-405b-instruct", name: "Llama 3.1 405B", brand: "meta", iconClass: "icon-meta", text: "∞" },
            { id: "cohere-command-r", name: "Cohere Command R", brand: "cohere", iconClass: "icon-cohere", text: "C" },
            { id: "grok-3", name: "Grok 3 (Preview)", brand: "grok", iconClass: "icon-grok", text: "X" },
            { id: "grok-3-mini", name: "Grok 3 Mini", brand: "grok", iconClass: "icon-grok", text: "X" },
            { id: "Ministral-3B", name: "Ministral 3B", brand: "mistral", iconClass: "icon-mistral", text: "M" }
        ];

        let selectedModelId = modelsCatalog[0].id;

        document.addEventListener("DOMContentLoaded", () => {
            const savedToken = localStorage.getItem("github_models_pat");
            if (savedToken) document.getElementById("tokenInput").value = savedToken;
            renderModelList();
            selectModel(selectedModelId);
        });

        function saveToken() {
            localStorage.setItem("github_models_pat", document.getElementById("tokenInput").value.trim());
        }

        function renderModelList() {
            const container = document.getElementById("modelList");
            container.innerHTML = "";
            modelsCatalog.forEach(model => {
                const item = document.createElement("div");
                item.className = `model-item ${model.id === selectedModelId ? 'active' : ''}`;
                item.id = `model-${model.id}`;
                item.onclick = () => selectModel(model.id);
                item.innerHTML = `
                    <div class="model-icon ${model.iconClass}">${model.text}</div>
                    <div class="model-name">${model.name}</div>
                `;
                container.appendChild(item);
            });
        }

        function selectModel(id) {
            document.querySelectorAll('.model-item').forEach(el => el.classList.remove('active'));
            selectedModelId = id;
            const targetModel = modelsCatalog.find(m => m.id === id);
            const targetElement = document.getElementById(`model-${id}`);
            if (targetElement) targetElement.classList.add('active');
            document.getElementById("currentModelHeader").innerText = `Active Model: ${targetModel.name}`;
        }

        function appendMessage(text, sender) {
            const chatWindow = document.getElementById("chatWindow");
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${sender}`;
            msgDiv.innerText = text;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return msgDiv;
        }

        async function sendMessage() {
            const token = document.getElementById("tokenInput").value.trim();
            const userInput = document.getElementById("userInput").value.trim();
            const sendBtn = document.getElementById("sendBtn");

            if (!token) { alert("Please input your token first."); return; }
            if (!userInput) return;

            appendMessage(userInput, 'user');
            document.getElementById("userInput").value = "";
            
            sendBtn.disabled = true;
            const loadingMessageDiv = appendMessage("Thinking...", 'assistant');

            try {
                // Production Azure/GitHub Marketplace routing endpoint
                const response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        model: selectedModelId,
                        messages: [{ role: "user", content: userInput }]
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Status ${response.status}: ${errorText || "Bad Request Content"}`);
                }

                const data = await response.json();
                loadingMessageDiv.innerText = data.choices[0].message.content;

            } catch (error) {
                console.error(error);
                loadingMessageDiv.innerText = `Error Details:\n${error.message}\n\nTip: Try changing the model to "Llama 3 8B (Universal Access)" to verify if your token is fully active!`;
                loadingMessageDiv.style.color = "#ff6b6b";
            } finally {
                sendBtn.disabled = false;
            }
        }

        document.getElementById("userInput").addEventListener("keydown", function(e) {
            if (e.ctrlKey && e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
