<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Changelog | ScribbleAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1A1A1A;
    --bg-2: #242424;
    --surface: rgba(255, 255, 255, 0.05);
    --border: rgba(255, 255, 255, 0.1);
    --border-strong: rgba(255, 255, 255, 0.2);
    --text: #FFFFFF;
    --muted: #A0A0A0;
    --accent: #2776F5;
    --accent-hover: #1A5BCA;
    --glow: 0 8px 30px rgba(39, 118, 245, 0.3);
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  
  body::before {
    content: ""; position: fixed; inset: 0; z-index: -2;
    background: radial-gradient(circle at 50% -20%, rgba(39, 118, 245, 0.15), transparent 70%);
  }
  
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 40px;
    background: rgba(26, 26, 26, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  
  .logo { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 18px; text-decoration: none; color: inherit; }
  .logo-mark {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--accent); display: grid; place-items: center; color: #fff; font-weight: 800;
  }
  
  .container { max-width: 800px; margin: 120px auto 80px; padding: 0 24px; }
  .section-head { text-align: center; margin-bottom: 48px; }
  h1 { font-size: 48px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 12px; }
  h1 .serif { font-family: 'Instrument Serif', serif; font-style: italic; color: var(--accent); font-weight: 400; }
  
  /* Admin Submission Panel */
  .admin-box { background: var(--bg-2); border: 1px solid var(--accent); border-radius: 16px; padding: 32px; margin-bottom: 48px; display: none; }
  .admin-box h3 { margin-bottom: 20px; font-size: 20px; font-weight: 700; }
  .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .form-group label { font-size: 14px; font-weight: 500; color: var(--muted); }
  .form-group input, .form-group textarea {
    background: var(--bg); border: 1px solid var(--border-strong); border-radius: 8px; padding: 14px; color: #fff; font-family: inherit; font-size: 15px; outline: none; transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
  
  /* Timeline Logs Layout */
  .changelog-list { display: flex; flex-direction: column; gap: 24px; }
  .changelog-item { background: var(--bg-2); border: 1px solid var(--border); border-radius: 16px; padding: 32px; position: relative; }
  .changelog-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .changelog-date { font-size: 14px; color: var(--accent); font-weight: 600; letter-spacing: 0.05em; }
  .changelog-title { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 12px; }
  .changelog-body { color: var(--muted); font-size: 15px; line-height: 1.6; white-space: pre-wrap; margin-bottom: 24px; }
  
  /* Interaction Toolbar */
  .interaction-row { display: flex; gap: 12px; align-items: center; border-top: 1px solid var(--border); padding-top: 16px; }
  .vote-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--surface); padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; color: var(--muted); border: 1px solid transparent; cursor: pointer; transition: all 0.2s; }
  .vote-btn:hover { color: #fff; border-color: var(--border-strong); background: rgba(255,255,255,0.08); }
  .vote-btn.active { background: rgba(39, 118, 245, 0.15); color: var(--accent); border-color: rgba(39, 118, 245, 0.3); }
  
  /* UI Buttons */
  .btn { display: inline-flex; align-items: center; justify-content: center; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; text-decoration: none; color: inherit; }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 4px 14px rgba(39, 118, 245, 0.4); }
  .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
  .btn-outline { border: 1px solid var(--border-strong); color: #fff; background: transparent; }
  .btn-outline:hover { background: var(--surface); }
  .btn-danger { background: rgba(255, 122, 122, 0.1); color: #ff7a7a; border: 1px solid rgba(255, 122, 122, 0.2); }
  .btn-danger:hover { background: #ff7a7a; color: #fff; }

  /* Notification Box Container */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal-overlay.active { display: flex; }
  .modal { width: 100%; max-width: 460px; background: var(--bg-2); border: 1px solid var(--border-strong); border-radius: 16px; padding: 36px; position: relative; animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
  @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--muted); cursor: pointer; }
  .modal-close:hover { color: #fff; }

  /* Toast Notifications */
  #toastContainer { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 12px; z-index: 9999; }
  .toast { background: rgba(26, 26, 26, 0.95); border: 1px solid var(--border-strong); backdrop-filter: blur(8px); color: #fff; padding: 16px 20px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: translateX(120%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 500; }
  .toast.show { transform: translateX(0); }
</style>
</head>
<body>

<nav>
  <a href="../index.html" class="logo">
    <div class="logo-mark">
      <img src="../assets/logo.png" alt="ScribbleAI logo" onerror="this.src='assets/logo.png'" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;" />
    </div>
    <span>ScribbleAI</span>
  </a>
  <div id="navCta">
    <button class="btn btn-primary" id="loginBtn">Sign in with Google</button>
  </div>
</nav>

<div class="container">
  <div class="section-head">
    <h1>Platform <span class="serif">Updates</span></h1>
    <p style="color: var(--muted); font-size: 16px; margin-top: 8px;">Follow along with our latest features and optimization patches.</p>
  </div>

  <div class="admin-box" id="adminPanel">
    <h3>Publish New Changelog</h3>
    <form id="changelogForm">
      <div class="form-group">
        <label>Update Title</label>
        <input type="text" id="titleInput" placeholder="e.g., Real-time Postgres databases are live" required />
      </div>
      <div class="form-group">
        <label>Details & Feature Log</label>
        <textarea id="descInput" rows="5" placeholder="Describe what changed..." required></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Publish Changelog</button>
    </form>
  </div>

  <div class="changelog-list" id="changelogContainer">
    <p style="text-align: center; color: var(--muted);">Loading release updates...</p>
  </div>
</div>

<div class="modal-overlay" id="announcementPopup">
  <div class="modal">
    <button class="modal-close" id="closePopupBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div style="display:inline-block; padding:4px 12px; background:rgba(39, 118, 245, 0.1); color:var(--accent); font-size:12px; font-weight:700; border-radius:999px; margin-bottom:16px; border:1px solid rgba(39, 118, 245, 0.3);">✨ LATEST PATCH</div>
    <h3 id="popupTitle" style="font-size: 24px; margin-bottom: 12px;"></h3>
    <p id="popupBody" style="color: var(--muted); font-size: 15px; line-height: 1.6; margin-bottom: 24px; white-space: pre-wrap;"></p>
    
    <div style="display:flex; gap:12px; margin-bottom:20px;" id="popupInteractionZone"></div>
    <button class="btn btn-primary" style="width: 100%; padding: 14px;" id="dismissPopupBtn">Dismiss Announcement</button>
  </div>
</div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal" style="max-width: 400px; padding: 28px;">
    <h3 id="confirmTitle" style="font-size: 20px; margin-bottom: 12px;"></h3>
    <p id="confirmBody" style="color: var(--muted); font-size: 15px; line-height: 1.5; margin-bottom: 24px;"></p>
    <div style="display: flex; gap: 12px; justify-content: flex-end;">
      <button class="btn btn-outline" id="confirmCancelBtn">Cancel</button>
      <button class="btn btn-danger" id="confirmActionBtn">Confirm</button>
    </div>
  </div>
</div>

<div id="toastContainer"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getDatabase, ref, push, set, onValue, remove, increment, update, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD5xI8GOG1lEKXBCunwq6qekg3QQOSijZ8",
    authDomain: "sitedropio.firebaseapp.com",
    databaseURL: "https://sitedropio-default-rtdb.firebaseio.com",
    projectId: "sitedropio",
    storageBucket: "sitedropio.firebasestorage.app",
    messagingSenderId: "950561906473",
    appId: "1:950561906473:web:45822a85f188c28b20e138",
    measurementId: "G-BY119K5RS2"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const provider = new GoogleAuthProvider();

  const ADMIN_EMAIL = "imcrabfr@gmail.com";
  let currentUser = null;

  // --- UI HELPER FUNCTIONS ---

  // Toast Notification Engine
  window.showToast = function(msg) {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `<span>${msg}</span>`;
    container.appendChild(toast);
    
    // Trigger animation
    setTimeout(() => toast.classList.add('show'), 10);
    
    // Cleanup
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  };

  // Custom Confirm Modal Engine
  window.showConfirm = function(title, msg, onConfirm, isDanger = true) {
    const modal = document.getElementById('confirmModal');
    const actionBtn = document.getElementById('confirmActionBtn');
    
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmBody').textContent = msg;
    
    actionBtn.className = isDanger ? 'btn btn-danger' : 'btn btn-primary';
    modal.classList.add('active');
    
    document.getElementById('confirmCancelBtn').onclick = () => modal.classList.remove('active');
    actionBtn.onclick = () => {
      modal.classList.remove('active');
      onConfirm();
    };
  };

  // --- IDENTITY STATE LIFECYCLE ---

  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    const navCta = document.getElementById('navCta');
    const adminPanel = document.getElementById('adminPanel');

    if (user) {
      navCta.innerHTML = `
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:14px;color:var(--muted)">${user.email}</span>
          <button class="btn btn-outline" id="signOutBtn">Sign out</button>
        </div>`;
      document.getElementById('signOutBtn').addEventListener('click', () => {
        signOut(auth);
        showToast("Signed out successfully.");
      });
      
      adminPanel.style.display = (user.email === ADMIN_EMAIL) ? "block" : "none";
    } else {
      navCta.innerHTML = `<button class="btn btn-primary" id="loginBtn">Sign in with Google</button>`;
      document.getElementById('loginBtn').addEventListener('click', () => signInWithPopup(auth, provider));
      adminPanel.style.display = "none";
    }
    renderLogsFeed();
  });

  // --- ADMIN ACTIONS ---

  const changelogForm = document.getElementById('changelogForm');
  changelogForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!currentUser || currentUser.email !== ADMIN_EMAIL) return;

    const title = document.getElementById('titleInput').value.trim();
    const desc = document.getElementById('descInput').value.trim();
    const newLogRef = push(ref(db, 'changelogs'));
    
    const payload = {
      id: newLogRef.key,
      title: title,
      description: desc,
      timestamp: Date.now(),
      date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
      likes: 0,
      dislikes: 0
    };

    await set(newLogRef, payload);
    await set(ref(db, 'latest_update'), payload);
    changelogForm.reset();
    showToast("Update published successfully!");
  });

  window.editLog = async function(id) {
    if (!currentUser || currentUser.email !== ADMIN_EMAIL) return;
    
    const logRef = ref(db, `changelogs/${id}`);
    const snapshot = await get(logRef);
    
    if (snapshot.exists()) {
      const currentData = snapshot.val();
      const newTitle = prompt("Edit Title:", currentData.title);
      if (newTitle === null) return; 
      
      const newDesc = prompt("Edit Description:", currentData.description);
      if (newDesc === null) return; 

      await update(logRef, { title: newTitle, description: newDesc });

      const latestSnap = await get(ref(db, 'latest_update'));
      if (latestSnap.exists() && latestSnap.val().id === id) {
        await update(ref(db, 'latest_update'), { title: newTitle, description: newDesc });
      }
      showToast("Changelog edited successfully.");
    }
  };

  window.reannounceLog = async function(id) {
    if (!currentUser || currentUser.email !== ADMIN_EMAIL) return;

    showConfirm(
      "Re-announce Update?", 
      "Are you sure you want to push this update to everyone's screen again? This will trigger the popup for all users.",
      async () => {
        const logRef = ref(db, `changelogs/${id}`);
        const snapshot = await get(logRef);
        
        if (snapshot.exists()) {
          const data = snapshot.val();
          const reannouncePayload = { ...data, id: `${data.id}_reannounced_${Date.now()}` };
          await set(ref(db, 'latest_update'), reannouncePayload);
          showToast("Update successfully re-announced.");
        }
      },
      false // Use primary button color, not danger
    );
  };

  window.deleteLog = async function(id) {
    if (!currentUser || currentUser.email !== ADMIN_EMAIL) return;

    showConfirm(
      "Delete Entry?", 
      "Are you sure you want to permanently delete this release log? This cannot be undone.",
      async () => {
        await remove(ref(db, `changelogs/${id}`));
        
        const latestSnap = await get(ref(db, 'latest_update'));
        if (latestSnap.exists() && latestSnap.val().id.includes(id)) {
          await remove(ref(db, 'latest_update'));
        }
        showToast("Entry permanently deleted.");
      }
    );
  };

  // --- TOGGLEABLE VOTING ENGINE ---

  window.voteLog = async function(id, type) {
    const prevVote = localStorage.getItem(`voted_${id}`);
    const nodes = {};
    let latestNodes = {};
    let message = "";

    if (prevVote === type) {
      // User clicked the same button again -> Remove their vote
      nodes[`changelogs/${id}/${type}`] = increment(-1);
      latestNodes[`latest_update/${type}`] = increment(-1);
      localStorage.removeItem(`voted_${id}`);
      message = "Feedback removed.";
    } else if (prevVote) {
      // User had a previous vote, but clicked the opposite button -> Switch vote
      nodes[`changelogs/${id}/${prevVote}`] = increment(-1);
      nodes[`changelogs/${id}/${type}`] = increment(1);
      
      latestNodes[`latest_update/${prevVote}`] = increment(-1);
      latestNodes[`latest_update/${type}`] = increment(1);
      
      localStorage.setItem(`voted_${id}`, type);
      message = "Feedback changed.";
    } else {
      // First time voting on this item
      nodes[`changelogs/${id}/${type}`] = increment(1);
      latestNodes[`latest_update/${type}`] = increment(1);
      localStorage.setItem(`voted_${id}`, type);
      message = "Feedback submitted. Thank you!";
    }

    // Apply the updates to the main log
    await update(ref(db), nodes);

    // Apply updates to the latest_update banner if it matches
    const snap = await get(ref(db, 'latest_update'));
    if (snap.exists() && snap.val().id.includes(id)) {
      await update(ref(db), latestNodes);
    }
    
    showToast(message);
    
    // Since Firebase real-time listeners (onValue) update the UI automatically,
    // the buttons will refresh their active state immediately.
  };

  // --- CORE UI RENDERING ---

  function renderLogsFeed() {
    onValue(ref(db, 'changelogs'), (snapshot) => {
      const container = document.getElementById('changelogContainer');
      if (!snapshot.exists()) {
        container.innerHTML = `<p style="text-align: center; color: var(--muted);">No platform updates published yet.</p>`;
        return;
      }
      
      const list = Object.values(snapshot.val()).sort((a, b) => b.timestamp - a.timestamp);
      const isAdmin = currentUser && currentUser.email === ADMIN_EMAIL;

      container.innerHTML = list.map(log => {
        const userVote = localStorage.getItem(`voted_${log.id}`);
        const likeActive = userVote === 'likes' ? 'active' : '';
        const dislikeActive = userVote === 'dislikes' ? 'active' : '';

        return `
          <div class="changelog-item">
            <div class="changelog-meta">
              <span class="changelog-date">${log.date}</span>
              ${isAdmin ? `
                <div style="display:flex; gap: 8px;">
                  <button class="btn btn-outline" style="font-size: 12px; padding: 6px 12px;" onclick="editLog('${log.id}')">Edit</button>
                  <button class="btn btn-outline" style="font-size: 12px; padding: 6px 12px;" onclick="reannounceLog('${log.id}')">Reannounce</button>
                  <button class="btn btn-danger" style="font-size: 12px; padding: 6px 12px;" onclick="deleteLog('${log.id}')">Delete</button>
                </div>
              ` : ''}
            </div>
            <h2 class="changelog-title">${log.title}</h2>
            <p class="changelog-body">${log.description}</p>
            <div class="interaction-row">
              <button class="vote-btn ${likeActive}" onclick="voteLog('${log.id}', 'likes')">👍 Like (${log.likes || 0})</button>
              <button class="vote-btn ${dislikeActive}" onclick="voteLog('${log.id}', 'dislikes')">👎 Dislike (${log.dislikes || 0})</button>
            </div>
          </div>
        `;
      }).join('');
    });
  }

  // --- POPUP ANNOUNCEMENT BANNER ---

  const popup = document.getElementById('announcementPopup');
  onValue(ref(db, 'latest_update'), (snapshot) => {
    if (snapshot.exists()) {
      const updateData = snapshot.val();
      const localCacheId = localStorage.getItem('seen_changelog_id');
      
      if (localCacheId !== updateData.id) {
        document.getElementById('popupTitle').textContent = updateData.title;
        document.getElementById('popupBody').textContent = updateData.description;
        
        const realDatabaseId = updateData.id.split('_reannounced_')[0];
        const userVote = localStorage.getItem(`voted_${realDatabaseId}`);
        const likeActive = userVote === 'likes' ? 'active' : '';
        const dislikeActive = userVote === 'dislikes' ? 'active' : '';

        document.getElementById('popupInteractionZone').innerHTML = `
          <button class="vote-btn ${likeActive}" style="flex:1; justify-content:center;" onclick="voteLog('${realDatabaseId}', 'likes')">👍 Like (${updateData.likes || 0})</button>
          <button class="vote-btn ${dislikeActive}" style="flex:1; justify-content:center;" onclick="voteLog('${realDatabaseId}', 'dislikes')">👎 Dislike (${updateData.dislikes || 0})</button>
        `;
        popup.classList.add('active');

        const dismiss = () => {
          popup.classList.remove('active');
          localStorage.setItem('seen_changelog_id', updateData.id);
        };
        document.getElementById('closePopupBtn').onclick = dismiss;
        document.getElementById('dismissPopupBtn').onclick = dismiss;
      }
    }
  });
</script>
</body>
</html>
